# =============================================================================
# Zammad 7.0.0 — docker-compose.yml
#
# DEVELOPMENT SETUP — includes SSL verification bypass for Keycloak over HTTP.
#
# ⚠️  PRODUCTION NOTE: Remove the `zammad-initializers` volume mount from
#     zammad-railsserver and delete the omniauth_ssl_bypass initializer before
#     going live. SSL verification MUST be enabled in production.
#
# Usage:
#   docker compose up -d
#
# First-run only (migrations, locale sync):
#   docker compose run --rm zammad-init
# =============================================================================

# ── Shared config anchor ──────────────────────────────────────────────────────
x-zammad-service: &zammad-service
  image: ghcr.io/zammad/zammad:7.0.0-1
  restart: unless-stopped
  depends_on:
    - zammad-postgresql
    - zammad-redis
    - zammad-elasticsearch
    - zammad-memcached
  networks:
    - zammad-net
  environment: &zammad-env
    # ── Database ──────────────────────────────────────────────────────────────
    POSTGRESQL_HOST: zammad-postgresql
    POSTGRESQL_PORT: "5432"
    POSTGRESQL_USER: zammad
    POSTGRESQL_PASS: zammad
    POSTGRESQL_DB: zammad_production

    # ── Cache / Sessions ──────────────────────────────────────────────────────
    REDIS_URL: redis://zammad-redis:6379
    MEMCACHE_SERVERS: zammad-memcached:11211

    # ── Search ────────────────────────────────────────────────────────────────
    ELASTICSEARCH_HOST: zammad-elasticsearch
    ELASTICSEARCH_PORT: "9200"
    ELASTICSEARCH_SCHEMA: http
    ELASTICSEARCH_NAMESPACE: zammad

    # ── App ───────────────────────────────────────────────────────────────────
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "true"
    ZAMMAD_RAILSSERVER_HOST: zammad-railsserver
    ZAMMAD_WEBSOCKET_HOST: zammad-websocket

    # ── Dev: allow Keycloak over plain HTTP inside Docker ─────────────────────
    # Remove in production
    OPENID_CONNECT_DISABLE_SSL_VERIFY: "true"

  volumes: &zammad-volumes
    - zammad-storage:/opt/zammad/storage
    # Custom initializer that bypasses SSL for OpenID Connect (dev only)
    - zammad-initializers:/opt/zammad/config/initializers/custom

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Init (runs once, then exits) ───────────────────────────────────────────
  # Handles: DB creation, migrations, locale sync, Elasticsearch index.
  # Re-run manually if you update Zammad: docker compose run --rm zammad-init
  zammad-init:
    <<: *zammad-service
    restart: "no"
    command: ["zammad-init"]
    volumes:
      - zammad-storage:/opt/zammad/storage
      - zammad-initializers:/opt/zammad/config/initializers/custom

  # ── Rails server ───────────────────────────────────────────────────────────
  zammad-railsserver:
    <<: *zammad-service
    command: ["zammad-railsserver"]
    volumes:
      - zammad-storage:/opt/zammad/storage
      - zammad-initializers:/opt/zammad/config/initializers/custom
    # Allow Zammad → Keycloak over HTTP on your Windows host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Websocket server ───────────────────────────────────────────────────────
  zammad-websocket:
    <<: *zammad-service
    command: ["zammad-websocket"]

  # ── Background jobs (scheduler) ────────────────────────────────────────────
  zammad-scheduler:
    <<: *zammad-service
    command: ["zammad-scheduler"]

  # ── Nginx (public entry point) ─────────────────────────────────────────────
  zammad-nginx:
    <<: *zammad-service
    command: ["zammad-nginx"]
    ports:
      - "8090:8080"
    depends_on:
      - zammad-railsserver
      - zammad-websocket

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  zammad-postgresql:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - zammad-net
    environment:
      POSTGRES_USER: zammad
      POSTGRES_PASSWORD: zammad
      POSTGRES_DB: zammad_production
    volumes:
      - zammad-postgresql-data:/var/lib/postgresql/data

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  zammad-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - zammad-net
    volumes:
      - zammad-redis-data:/data

  # ── Elasticsearch 8.13.4 ──────────────────────────────────────────────────
  zammad-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: unless-stopped
    networks:
      - zammad-net
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - zammad-elasticsearch-data:/usr/share/elasticsearch/data

  # ── Memcached ─────────────────────────────────────────────────────────────
  zammad-memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
    networks:
      - zammad-net
    command: ["memcached", "-m", "256m"]

  # ── Backup (daily at 03:00) ────────────────────────────────────────────────
  # Dumps PostgreSQL + copies storage into zammad-backup volume.
  # Access backups: docker exec zammad-backup ls /var/tmp/zammad
  zammad-backup:
    <<: *zammad-service
    command: ["zammad-backup"]
    restart: unless-stopped
    environment:
      <<: *zammad-env
      BACKUP_TIME: "03:00"
      HOLD_DAYS: "10"
    volumes:
      - zammad-storage:/opt/zammad/storage:ro
      - zammad-backup:/var/tmp/zammad

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  zammad-postgresql-data:
  zammad-redis-data:
  zammad-elasticsearch-data:
  zammad-storage:
  zammad-backup:
  zammad-initializers:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  zammad-net:
    driver: bridge
