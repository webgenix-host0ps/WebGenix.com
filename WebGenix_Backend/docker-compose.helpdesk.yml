version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: helpdesk-postgres
    restart: always
    environment:
      POSTGRES_DB: Webgenix_helpdesk_db
      POSTGRES_USER: Webgenix_helpdesk_user
      POSTGRES_PASSWORD: Webgenix_helpdesk_Password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: helpdesk-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@webgenix.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: